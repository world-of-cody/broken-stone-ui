name: CI + Vercel Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test -- --run

      - name: Build
        run: npm run build

      - name: Pull Vercel environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_PROJECT_ID" ] || [ -z "$VERCEL_ORG_ID" ]; then
            echo "Vercel secrets are missing" >&2
            exit 1
          fi
          if [ "${{ github.event_name }}" = "push" ]; then
            export VERCEL_ENV=production
          else
            export VERCEL_ENV=preview
          fi
          npx vercel pull --yes --environment=$VERCEL_ENV \
            --token=$VERCEL_TOKEN \
            --project-id=$VERCEL_PROJECT_ID \
            --org-id=$VERCEL_ORG_ID

      - name: Build artifacts for Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            export VERCEL_ENV=production
          else
            export VERCEL_ENV=preview
          fi
          npx vercel build \
            --token=$VERCEL_TOKEN \
            --project-id=$VERCEL_PROJECT_ID \
            --org-id=$VERCEL_ORG_ID \
            --environment=$VERCEL_ENV

      - name: Deploy to Vercel
        id: vercel-deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            DEPLOY_URL=$(npx vercel deploy --prebuilt --prod \
              --token=$VERCEL_TOKEN \
              --project-id=$VERCEL_PROJECT_ID \
              --org-id=$VERCEL_ORG_ID)
          else
            DEPLOY_URL=$(npx vercel deploy --prebuilt \
              --token=$VERCEL_TOKEN \
              --project-id=$VERCEL_PROJECT_ID \
              --org-id=$VERCEL_ORG_ID)
          fi
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PR_PREVIEW_URL: ${{ steps.vercel-deploy.outputs.url }}
        with:
          script: |
            const url = process.env.PR_PREVIEW_URL;
            if (!url) {
              core.warning('No preview URL emitted by Vercel deploy step.');
              return;
            }
            const body = `✅ Vercel preview ready: ${url}`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
